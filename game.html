<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=  device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href= "game.css"/> 
</head> 
<body>
    <h1>Rock Paper Scissors</h1>
    <!-- THE IMAGES -->
    <!-- To access which button is tapped by user whether rock or paper or scissor we created different images and given different ids -->
     <div class="choices">
        <div class="choice" id="rock">
            <img src="rock.png" />
        </div>
        <div class="choice" id="paper">
            <img src="paper.png" />
        </div>
        <div class="choice" id="scissors">
            <img src="scissors.png" />
        </div>
     </div>

     <!-- SCORE BOARD -->

     <div class="score-board">
        <!-- The paragraph will be updated because scores will be updated therefore providing paragraph ids because afterwards we have to access it in JS folder-->
        <div class="score">
            <p id="user-score">0</p>
            <p>You</p>
        </div>
        <div class="score">
            <p id="comp-score">0</p>
            <p>Computer</p>
        </div>
     </div>

     <!-- Tell the current result -->
      <div class="msg-container">
        <p class="msg">Play your move</p>
      </div>
    <script src="game.js"></script>
</body>
